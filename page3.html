<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>azic | 한 줄씩 이어 쓰는 릴레이 소설</title>
    <link rel="stylesheet" href="./src/styles/base.css" />
    <link rel="stylesheet" href="./src/styles/pages.css" />
  </head>
  <body class="page-body" data-page="page3">
    <div class="page-shell">
      <header class="page-header">
        <div class="page-header__brand">
          <img src="./assets/images/landing-logos/Group 24.png" alt="azic logo" />
          <div class="page-header__copy">
            <strong>Page 3 / Round-robin Novel</strong>
            <span>방문자들이 함께 이어 쓰는 azic world의 공동 서사</span>
          </div>
        </div>
        <a class="page-back" href="./index.html#story">azic world로 돌아가기</a>
      </header>
      <main class="page-main">
        <section class="page-hero">
          <p class="page-hero__eyebrow">Round-robin Novel</p>
          <h1>다음 문장을 남겨 azic의 소설을 이어보세요</h1>
          <p>이 페이지는 접속한 사람들이 한 문단씩 이어 쓰며 서사를 만드는 릴레이 소설 공간입니다. 브라우저 안에 임시 저장되어 바로 테스트해볼 수 있습니다.</p>
        </section>

        <section class="page-section community-grid">
          <div class="novel-panel">
            <h2 class="page-section__title">새 문장 남기기</h2>
            <form class="form-stack" id="relayForm">
              <input name="author" type="text" placeholder="이름 또는 닉네임" />
              <textarea name="text" placeholder="이전 문장 뒤에 이어질 다음 문단을 적어주세요."></textarea>
              <button type="submit">문장 이어 쓰기</button>
            </form>
          </div>
          <div>
            <h2 class="page-section__title">Current Story</h2>
            <div class="novel-list" id="relayEntries"></div>
          </div>
        </section>
        <footer class="page-footer">
          <span>azic world</span>
          <span>책을 다 읽지 못해도, 마음은 남습니다.</span>
        </footer>
      </main>
    </div>
    <script src="./src/scripts/pages.js"></script>
  </body>
</html>
