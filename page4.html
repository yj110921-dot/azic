<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>azic | 쌓여 있는 책을 올리고, 서로 말을 거는 커뮤니티</title>
    <link rel="stylesheet" href="./src/styles/base.css" />
    <link rel="stylesheet" href="./src/styles/pages.css" />
  </head>
  <body class="page-body" data-page="page4">
    <div class="page-shell">
      <header class="page-header">
        <div class="page-header__brand">
          <img src="./assets/images/landing-logos/Group 24.png" alt="azic logo" />
          <div class="page-header__copy">
            <strong>Page 4 / Upload Community</strong>
            <span>사용자가 책장을 올리고 댓글로 반응할 수 있는 참여 페이지</span>
          </div>
        </div>
        <a class="page-back" href="./index.html#story">azic world로 돌아가기</a>
      </header>
      <main class="page-main">
        <section class="page-hero">
          <p class="page-hero__eyebrow">Upload Community</p>
          <h1>당신의 쌓인 책들과 아직의 마음을 올려보세요</h1>
          <p>이 페이지는 아직의 이용자가 자신의 책 사진과 마음을 올리고, 다른 방문자들이 댓글로 코멘트를 남길 수 있는 커뮤니티 프로토타입입니다.</p>
        </section>

        <section class="page-section community-grid">
          <aside class="community-panel">
            <h2 class="page-section__title">새 책장 올리기</h2>
            <form class="form-stack" id="uploadForm">
              <input name="author" type="text" placeholder="닉네임" />
              <input name="title" type="text" placeholder="책장 제목 또는 책 이름" />
              <textarea name="story" placeholder="왜 아직 읽지 못했는지, 어떤 마음으로 샀는지 적어보세요."></textarea>
              <input name="image" type="file" accept="image/*" />
              <button type="submit">업로드하기</button>
            </form>
          </aside>
          <div>
            <h2 class="page-section__title">Community Feed</h2>
            <div class="feed-list" id="communityFeed"></div>
          </div>
        </section>
        <footer class="page-footer">
          <span>azic world</span>
          <span>책을 다 읽지 못해도, 마음은 남습니다.</span>
        </footer>
      </main>
    </div>
    <script src="./src/scripts/pages.js"></script>
  </body>
</html>
